import Spinner from './Spinner';

export default function Button({ children, variant = 'primary', size = 'md', loading = false, disabled = false, className = '', onClick, type = 'button', ...props }) {
  const v = { primary: 'btn-primary', outline: 'btn-outline', ghost: 'btn-ghost', danger: 'bg-red-600/80 hover:bg-red-600 text-white font-medium rounded-lg transition-colors' };
  const s = { sm: 'px-3 py-1.5 text-sm', md: 'px-4 py-2', lg: 'px-6 py-3 text-base' };
  return (
    <button type={type} onClick={onClick} disabled={disabled || loading}
      className={`inline-flex items-center justify-center gap-2 ${v[variant]} ${s[size]} disabled:opacity-50 disabled:cursor-not-allowed transition-all ${className}`}
      {...props}>
      {loading && <Spinner size="sm" />}
      {children}
    </button>
  );
}
